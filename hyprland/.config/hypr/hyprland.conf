# ── Monitor ──────────────────────────────
# Scale 1.05 ≈ 5% larger UI (fractional scaling). Revert to 1 if anything looks blurry.
monitor = ,preferred,auto,1.1

# ── Autostart ────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Optional (from i3): kdeconnect, MPRIS bridge — uncomment if installed
# exec-once = /usr/libexec/kdeconnectd
# exec-once = mpris-proxy

# Wallpaper: `exec` runs on every config load (including hyprctl reload); `exec-once` does not
exec = /home/skhan/.config/hypr/scripts/wallpaper.sh

# ── Environment ──────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

# ── Window rules (i3-style floating) ─────
windowrulev2 = float, class:^(FXTerm)$
windowrulev2 = size 600 600, class:^(FXTerm)$
windowrulev2 = float, class:^(pcmanfm)$
windowrulev2 = size 800 800, class:^(pcmanfm)$
windowrulev2 = center, class:^(pcmanfm)$

# ── Input ─────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    # Snappier key repeat (optional; tune to taste)
    repeat_rate = 35
    repeat_delay = 280

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ── General ───────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(3b4252aa)

    layout = dwindle
}

# ── Decoration ────────────────────────────
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 6
        passes = 2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}


# ── Layout ────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Misc ──────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# Frosted Waybar — namespace must match fully (Hyprland ≥0.46 RE2)
layerrule = blur,^(waybar)$
layerrule = ignorezero,^(waybar)$

# ─────────────────────────────────────────
# KEYBINDS (aligned with your i3 config)
# $mod = Super (i3 Mod4)
# ─────────────────────────────────────────
$mod = SUPER

# Lock screen (Wayland: swaylock; image path from i3)
bind = $mod, Escape, exec, swaylock -i /home/skhan/Downloads/Wallpapers/sol.jpg

# Terminal
bind = $mod, Return, exec, foot

# Kill focused window
bind = $mod SHIFT, Q, killactive

# App launcher (j4-dmenu-desktop if installed, else rofi)
bind = $mod, D, exec, sh -c 'command -v j4-dmenu-desktop >/dev/null && exec j4-dmenu-desktop --no-generic --display-binary || exec rofi -show drun'

# Focus — i3: j=left k=down l=up ;=right
bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, L, movefocus, u
bind = $mod, semicolon, movefocus, r

bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# Move focused window
bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, L, movewindow, u
bind = $mod SHIFT, semicolon, movewindow, r

bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Dwindle: i3 “split h / split v” → preselect where the next window opens
bind = $mod, H, layoutmsg, preselect r
# Vertical split (was $mod+V; V is clipboard history below)
bind = $mod SHIFT, V, layoutmsg, preselect d

# Clipboard history (cliphist + rofi; needs: cliphist, wl-clipboard)
bind = $mod, V, exec, sh -c 'cliphist list | rofi -dmenu -p "Clipboard" -i | cliphist decode | wl-copy'

# Fullscreen & Chrome (i3: Shift+f fullscreen, F = chrome)
bind = $mod SHIFT, F, fullscreen
bind = $mod, F, exec, google-chrome-stable

# Floating terminal (FXTerm rules above) — foot with app-id + working dir
bind = $mod SHIFT, Return, exec, ghostty -a FXTerm --working-directory=/home/skhan/Practice/

# File manager
bind = $mod, P, exec, pcmanfm --class pcmanfm

# Scratchpad (special workspace)
bind = $mod SHIFT, minus, movetoworkspace, special:scratchpad
bind = $mod, minus, togglespecialworkspace, special:scratchpad

# Layout (dwindle analogues; i3 stacking/tabbed/toggle split)
bind = $mod, E, layoutmsg, togglesplit
bind = $mod, W, togglegroup
bind = $mod, S, layoutmsg, swapsplit

# Floating / focus between tiled and floating layers
bind = $mod SHIFT, space, togglefloating
bind = $mod, space, cyclenext, floating

# Parent container (i3 “focus parent”) — must use layoutmsg, not a standalone dispatcher
bind = $mod, A, layoutmsg, focusparent

# Workspaces 1–10 (i3 used 0 for 10)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Config reload / “restart” compositor config
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload

# Exit Hyprland (i3 had a nagbar; here: zenity confirm)
bind = $mod SHIFT, E, exec, sh -c 'zenity --question --title=Hyprland --text="Exit Hyprland?" && hyprctl dispatch exit'

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Brightness & volume — OSD via Mako (progress bar + icons; see scripts/media-osd.sh)
# Requires: brightnessctl, PipeWire wpctl, notify-send (libnotify)
bind = , XF86MonBrightnessUp, exec, /home/skhan/.config/hypr/scripts/media-osd.sh brightness-up
bind = , XF86MonBrightnessDown, exec, /home/skhan/.config/hypr/scripts/media-osd.sh brightness-down
# PipeWire allows >100% unless limited; -l 1.5 caps at 150% (change to 1.0 for 100% max)
bind = , XF86AudioRaiseVolume, exec, /home/skhan/.config/hypr/scripts/media-osd.sh volume-up
bind = , XF86AudioLowerVolume, exec, /home/skhan/.config/hypr/scripts/media-osd.sh volume-down
bind = , XF86AudioMute, exec, /home/skhan/.config/hypr/scripts/media-osd.sh mute
bind = , XF86AudioMicMute, exec, /home/skhan/.config/hypr/scripts/media-osd.sh mic-mute

# Toggle Waybar visibility (i3: bar mode toggle) — SIGUSR1 toggles hide/show
bind = $mod, M, exec, pkill -SIGUSR1 waybar

# ── Resize submap (i3 $mod+r resize mode) ──
bind = $mod, R, submap, resize

submap = resize

binde = , J, resizeactive, -10 0
binde = , K, resizeactive, 0 10
binde = , L, resizeactive, 0 -10
binde = , semicolon, resizeactive, 10 0

binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0

bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mod, R, submap, reset

submap = reset
