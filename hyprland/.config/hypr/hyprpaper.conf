# Used when hyprpaper is installed (see scripts/wallpaper.sh — hyprpaper is preferred over swaybg)
# sudo dnf install hyprpaper

splash = false

# Images must be preloaded before they can be shown (see hyprpaper README).
preload = /home/skhan/Pictures/wallpapers/milky-way.jpg

# Monitor name from: hyprctl monitors (e.g. eDP-1). Default mode is fill/cover.
wallpaper = eDP-1,/home/skhan/Pictures/wallpapers/milky-way.jpg
